[workspace]
members = [".", "xtask"]
resolver = "2"
default-members = ["."]

[workspace.package]
version = "0.1.0"
edition = "2024"
description = "Nepali Patro in your terminal"
license = "MIT"
categories = ["command-line-utilities"]
keywords = ["nepali", "calendar", "bikram-sambat", "tui", "terminal"]

[package]
name = "npltz"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
categories.workspace = true
keywords.workspace = true

[dependencies]
ratatui = "0.30"
crossterm = "0.29"
chrono = "0.4.45"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"
debug = false
lto = true
