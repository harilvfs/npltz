name: "Bug Report"
description: "Report a bug to help us improve"
title: "[Bug]: "
labels: ["bug"]
assignees:
  - harilvfs
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Provide a clear and concise description of the bug."
      placeholder: "Describe the issue in detail..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "List the steps to reproduce the issue."
      placeholder: |
        1. First Step
        2. Second Step
        3. Additional Steps
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "What should happen instead?"
      placeholder: "Describe the intended or correct behavior."
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: "Platform(os)"
      description: "Which OS are you using?"
      options:
        - Linux
        - MacOS
        - Windows
        - Other (please specify below)
    validations:
      required: true

  - type: input
    id: other_os
    attributes:
      label: "Other OS (if not listed)"
      description: "If you selected 'Other', specify your OS info."
      placeholder: "Enter OS name"
    validations:
      required: false

  - type: dropdown
    id: shell
    attributes:
      label: "Shell"
      description: "Which shell are you using?"
      options:
        - Bash
        - Zsh
        - Fish
        - Other (please specify below)
    validations:
      required: true

  - type: input
    id: other_shell
    attributes:
      label: "Other Shell"
      description: "If you selected 'Other', specify your shell."
      placeholder: "Enter shell name"
    validations:
      required: false

  - type: input
    id: npltz_version
    attributes:
      label: "npltz Version"
      description: "Which version of the npltz are you using?"
      placeholder: "e.g., latest commit, version number"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: "Terminal Emulator"
      description: "Which terminal emulator are you using?"
      placeholder: "e.g., Alacritty, Kitty, Ghostty, or Powershell(Windows) etc."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots (if applicable)"
      description: "Attach screenshots if they help explain the problem."
      placeholder: "Drag and drop screenshots here."
    validations:
      required: false

  - type: textarea
    id: additional_info
    attributes:
      label: "Additional Information"
      description: "Include any other relevant details, error messages, or recent changes."
      placeholder: "Paste error messages or additional notes here."
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/harilvfs/npltz/blob/main/.github/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true


