name: Release

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Release tag (e.g., v1.1.1)'
        required: true
        type: string
      tag_title:
        description: 'Release title (e.g., v1.1.1@Y-M-D)'
        required: true
        type: string
      update_version:
        description: 'Do you want to update the version in the repository?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up version variables
        run: |
          VERSION=$(echo "${{ github.event.inputs.tag_version }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update Cargo.toml version
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: |
          sed -i "/\[workspace.package\]/,/^\[/ s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Install Rust (nightly) with MUSL targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Install rust-src
        run: rustup component add rust-src --toolchain nightly-2025-12-31

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Run cargo build to update Cargo.lock
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: cargo build --release

      - name: Commit version changes
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version"
          git push

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-rs for cross-compilation
        run: cargo install cross

      - name: Build x86_64 binary
        run: |
          cargo build \
            --release \
            --verbose \
            --target-dir=build \
            --target=x86_64-unknown-linux-musl

      - name: Build aarch64 binary (with cross)
        run: |
          cross build \
            --release \
            --verbose \
            --target-dir=build \
            --target=aarch64-unknown-linux-musl

      - name: Rename binaries
        run: |
          cp build/x86_64-unknown-linux-musl/release/npltz npltz-x86_64-unknown-linux-musl
          cp build/aarch64-unknown-linux-musl/release/npltz npltz-aarch64-unknown-linux-musl
          chmod +x npltz-x86_64-unknown-linux-musl npltz-aarch64-unknown-linux-musl

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: |
            npltz-x86_64-unknown-linux-musl
            npltz-aarch64-unknown-linux-musl
          retention-days: 1

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          version: "v2.9.1"
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: BODY.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release header
        run: |
          sed -i '/^## \[unreleased\]/d' BODY.md
          printf "## What's Changed\n\n%s\n" "$(cat BODY.md)" > BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_version }}
          name: ${{ github.event.inputs.tag_title }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: BODY.md

      - name: Upload Linux assets
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} \
            npltz-x86_64-unknown-linux-musl \
            npltz-aarch64-unknown-linux-musl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    runs-on: macos-14
    needs: release
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-${{ matrix.target }}-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-${{ matrix.target }}-

      - name: Build binary
        run: |
          cargo build \
            --release \
            --verbose \
            --target-dir=build \
            --target=${{ matrix.target }}

      - name: Rename binary
        run: |
          cp build/${{ matrix.target }}/release/npltz npltz-${{ matrix.target }}

      - name: Upload macOS asset
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} \
            npltz-${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    needs: release
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-${{ matrix.target }}-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-${{ matrix.target }}-

      - name: Build binary
        run: |
          cargo build `
            --release `
            --verbose `
            --target-dir=build `
            --target=${{ matrix.target }}

      - name: Rename binary
        run: |
          Copy-Item "build/${{ matrix.target }}/release/npltz.exe" "npltz-${{ matrix.target }}.exe"

      - name: Upload Windows asset
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} `
            npltz-${{ matrix.target }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Rust (nightly) with Android targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install rust-src
        run: rustup component add rust-src --toolchain nightly-2025-12-31

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-android-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-android-

      - name: Install cross
        run: cargo install cross

      - name: Build aarch64 Android binary
        run: |
          cross build \
            --release \
            --target-dir=build \
            --target=aarch64-linux-android

      - name: Build armv7 Android binary
        run: |
          cross build \
            --release \
            --target-dir=build \
            --target=armv7-linux-androideabi

      - name: Rename binaries
        run: |
          cp build/aarch64-linux-android/release/npltz npltz-aarch64-linux-android
          cp build/armv7-linux-androideabi/release/npltz npltz-armv7-linux-androideabi
          chmod +x npltz-aarch64-linux-android npltz-armv7-linux-androideabi

      - name: Upload Android assets
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} \
            npltz-aarch64-linux-android \
            npltz-armv7-linux-androideabi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
